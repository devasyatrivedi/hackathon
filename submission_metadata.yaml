ai_usage_summary: |
  Used Claude (Claude Code) for architectural review of the scoring framework,
  refactoring rank.py, and debugging the honeypot/tie-break logic.
  All design decisions (pillar weights, evidence-over-keywords approach, honeypot
  rules) were made and verified by the team.




methodology_summary: |
  Rule-based, fully explainable ranker (Python stdlib only, ~25s for 100K on CPU).
  Four pillars combined as: 0.30*skills+evidence + 0.45*production-experience +
  0.15*years+seniority + location modifier, all multiplied by a behavioral
  availability factor in [0.80, 1.10]; structurally-impossible profiles are
  forced to -1.0. The decisive choice is weighting career-history EVIDENCE (what
  the candidate actually built — ranking/retrieval/recsys at product companies)
  above the raw skills keyword list, which directly defuses the keyword-stuffer
  traps the JD warns about. Honeypots are detected with internally-consistent
  career-duration math rather than unreliable education-year gates, giving 0
  honeypots in the top 100. Top ranks are 6–9-year Applied ML / Recommendation /
  Search / NLP engineers with production ranking experience.



